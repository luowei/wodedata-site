<link rel="stylesheet" href="/wodedata-site/_astro/_slug_.7bWxXePX.css"></head> <body>   <div class="container" data-astro-cid-ea56lfqw>  <div><h4>汉字笔画</h4>
<p>书写汉字时，一次写成的一个连续不断的线段叫笔画</p>
<p>在只考虑笔画的运笔方向，而不计其长短轻重时，汉字的笔画分为五类：</p>
<p><strong>横　竖　撇　捺　折</strong></p>
<p>１　２　３　４　５</p>
<p><strong>横</strong>：运笔方向从左到右 提笔也属于横　现、场、特、冲</p>
<p><strong>竖</strong>：运笔方向从上到下 左竖钩也属于竖　了、才、利</p>
<p><strong>撇</strong>：运笔方向从右上到左下　川、毛、人</p>
<p><strong>捺</strong>：运笔方向从左上到右下 点也属于捺　学、家、心</p>
<p><strong>折</strong>：所有带转折的笔画（除左竖钩外)</p></div>  </div>    </body></html>
